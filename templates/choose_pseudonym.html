<!-- templates/choose_pseudonym.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Pseudonym</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/choose_pseudonym.css') }}">
</head>
<body>
    <div class="pseudonym-container">
        <h1>Choose Your Pseudonym</h1>
        <form method="POST">
            <label for="pseudonym">Enter up to 13 alphanumeric characters:</label>
            <input type="text" name="pseudonym" required maxlength="13" pattern="[A-Za-z0-9]+" placeholder="Your Pseudonym">
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
