<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set Pseudonym</title>
    <link rel="stylesheet" href="choose_pseudonym.css">
</head>
<body>
    <h1>Choose Your Pseudonym</h1>
    <form method="POST">
        <label for="pseudonym">Enter up to 13 alphanumeric characters:</label>
        <input type="text" name="pseudonym" required maxlength="13" pattern="[A-Za-z0-9]+">
        <button type="submit">Save</button>
    </form>
</body>
</html>
